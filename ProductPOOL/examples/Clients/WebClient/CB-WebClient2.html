<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConceptBase Web Interface V2.0</title>
    <style>
        /* --- General Reset & Fonts --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f7f6; 
        }
        h1 {
            color: #1a1a1a;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        /* Adjust the logo size and alignment within the header */
        h1 img {
            height: 30px; /* Set a fixed height for the logo */
            vertical-align: middle; /* Align the image with the text baseline */
            margin-left: 10px;
        }

        /* --- Layout (Flexbox) --- */
        #main-layout {
            display: flex;
            gap: 20px; /* Space between columns */
            min-height: 80vh;
        }

        /* Left Column (Connection) */
        #left-sidebar {
            flex: 0 0 300px; /* Fixed width for the sidebar */
            padding: 15px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Right Column (Commands & Output) */
        #right-content {
            flex-grow: 1; /* Takes up the remaining space */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Components --- */
        .section {
            padding: 15px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: 600; 
            color: #333;
        }
        input[type="text"], textarea, select { 
            width: 95%; 
            padding: 10px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        textarea {
            resize: vertical;
        }
        
        /* Buttons Container */
        .command-buttons-group {
            display: flex;
            flex-wrap: wrap; /* Allows buttons to wrap if space is tight */
            gap: 8px;
            margin-top: 15px;
        }
        
        /* General Button Styling */
        button { 
            padding: 10px 15px; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: background-color 0.3s;
        }
        
        /* Connection Buttons */
        .connect-buttons button { background-color: #28a745; margin-right: 10px; }
        .connect-buttons button:hover { background-color: #1e7e34; }
        .disconnect-button { background-color: #dc3545 !important; }

        /* Command Buttons (TELL, UNTELL, ASK) */
        .execute-button { background-color: #007bff; }
        .execute-button:hover { background-color: #0056b3; }
        
        /* Utility Buttons (CLEAR, LIST) */
        .utility-button { background-color: #6c757d; }
        .utility-button:hover { background-color: #5a6268; }

        /* Output Window */
        #output { 
            flex-grow: 1;
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #000; 
            padding: 15px; 
            margin-top: 0;
            overflow: auto;
            white-space: pre-wrap; 
            border-radius: 4px; 
            font-family: 'Consolas', 'Courier New', monospace;
        }
    </style>
</head>
<body>

<h1>ConceptBase Web Client <img align ="right" src="https://conceptbase.sourceforge.net/conceptbase-cc-logo.gif" alt="ConceptBase Logo"></h1>
    
    <div id="main-layout">
        
        <div id="left-sidebar">
            
            <label for="cbHost">CB Host:</label>
            <input type="text" id="cbHost" value="localhost">
            
            <label for="cbPort">CB Port:</label>
            <input type="text" id="cbPort" value="4001">

            <div class="connect-buttons">
                <button onclick="connectCB()">🔗 Connect / enrollMe</button>
                <button onclick="disconnectCB()" class="disconnect-button">🚫 disconnect</button>
            </div>
        </div>
        
        <div id="right-content">
            
            <div class="section">
                <label for="commandData">Frames/Query (e.g., Person in Class with attribute name: String end):</label>
                <textarea id="commandData" rows="20" placeholder="Enter frames here..."></textarea>
                
                <div class="command-buttons-group">
                    <button onclick="executeCommand('tell')" class="execute-button">TELL</button>
                    <button onclick="executeCommand('untell')" class="execute-button">UNTELL</button>
                    <button onclick="executeCommand('ask')" class="execute-button">ASK</button>
                    <button onclick="clearFrames()" class="utility-button">CLEAR</button>
                    <button onclick="listModules()" class="utility-button">LIST</button>
                </div>
            </div>
            
            <div class="section" style="flex-grow: 1; padding: 0;">
                <h2 style="padding: 15px 15px 0 15px; margin: 0;">Output</h2>
                <pre id="output">Status: Disconnected. Connect to begin.</pre>
            </div>
            
        </div>
        
    </div>

    <script>
        const MIDDLEWARE_URL = 'http://localhost:8080/api/cb';
        const output = document.getElementById('output');
        const commandDataElement = document.getElementById('commandData');
        
        // Fixed connection parameters
        const FIXED_TOOL_ID = "CBWebClient";
        const FIXED_USER = "cbwebclientuser";

        /**
         * Sends a command payload to the Java Middleware.
         * @param {string} command - The ConceptBase command (e.g., 'tell', 'ask', 'enrollMe').
         * @param {string} dataString - The frame or query data to send.
         */
        async function sendToMiddleware(command, dataString = "") {
            output.textContent = `Sending command: ${command}...`;
            try {
                const cbHost = document.getElementById('cbHost').value;
                const cbPort = document.getElementById('cbPort').value;
                
                // Build the payload 
                const payload = {
                    command,
                    host: cbHost,
                    port: parseInt(cbPort, 10),
                    tool: FIXED_TOOL_ID, 
                    user: FIXED_USER,   
                    data: dataString 
                };

                const response = await fetch(MIDDLEWARE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const json = await response.json();
                
                output.textContent = 
                    `Status: ${json.status}\n` +
                    `Message:\n${json.message}`;
                
                return json; // Return the full JSON object for use in other functions
                
            } catch (error) {
                output.textContent = `🚨 Connection Error:\n${error.message}\n` +
                                     `Check if the Java Middleware server is running on ${MIDDLEWARE_URL}.`;
            }
        }

        // --- Core Command Functions (TELL, UNTELL, ASK) ---
        function executeCommand(command) {
            const dataString = commandDataElement.value;
            // The Java middleware is now responsible for handling the \n to LF replacement.
            sendToMiddleware(command, dataString);
        }

        function connectCB() {
            sendToMiddleware('enrollMe');
        }
        
        function disconnectCB() {
            sendToMiddleware('cancelMe');
        }
        
        // --- Utility Functions ---

        /**
         * Clears the Frames/Query textarea.
         */
        function clearFrames() {
            commandDataElement.value = "";
            output.textContent = "Frames/Query canvas cleared.";
        }
        
        /**
         * Executes the 'listModule' query and puts the result into the Frames/Query canvas.
         */
        async function listModules() {
            const listQuery = "listModule";
            output.textContent = "Requesting module list...";
            
            // Send a command of type 'ask' with the query 'listModule'
            const resultJson = await sendToMiddleware('ask', listQuery);
            
            if (resultJson && resultJson.status === 'OK') {
                // Put the resulting message directly into the command canvas
                commandDataElement.value = resultJson.message;
                output.textContent = "Module list loaded into Frames/Query canvas.";
            } else if (resultJson) {
                // If it failed, the sendToMiddleware already populated the output with the error.
                commandDataElement.value = "";
            } else {
                 output.textContent = "Failed to connect to middleware to retrieve module list.";
            }
        }

    </script>
</body>
</html>
