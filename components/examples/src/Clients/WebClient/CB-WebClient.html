<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConceptBase Web Interface</title>
    <style>
        /* --- General Reset & Fonts --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f7f6; 
        }
        h1 {
            color: #1a1a1a;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
        }

        /* Adjust the logo size and alignment within the header */
        h1 img {
            height: 30px; /* Set a fixed height for the logo */
            vertical-align: middle; /* Align the image with the text baseline */
            margin-left: 10px;
        }

        /* --- Layout (Flexbox) --- */
        #main-layout {
            display: flex;
            gap: 20px; /* Space between columns */
            min-height: 80vh;
        }

        /* Left Column (Connection) */
        #left-sidebar {
            flex: 0 0 300px; /* Fixed width for the sidebar */
            padding: 15px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Right Column (Commands & Output) */
        #right-content {
            flex-grow: 1; /* Takes up the remaining space */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Components --- */
        .section {
            padding: 15px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        label { 
            display: block; 
            margin-top: 15px; 
            font-weight: 600; 
            color: #333;
        }
        input[type="text"], textarea, select { 
            width: 95%; 
            padding: 10px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        textarea {
            resize: vertical;
        }
        
        /* Buttons */
        .connect-buttons button {
            background-color: #28a745;
            margin-right: 10px;
        }
        .command-button {
            background-color: #007bff;
        }
        button { 
            padding: 10px 15px; 
            margin-top: 15px; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            transition: background-color 0.3s;
        }
        .connect-buttons button:hover { background-color: #1e7e34; }
        .command-button:hover { background-color: #0056b3; }

        /* Output Window */
        #output { 
            flex-grow: 1;
            background-color: #333;
            color: #e0e0e0;
            border: 1px solid #000; 
            padding: 15px; 
            margin-top: 0;
            overflow: auto;
            white-space: pre-wrap; 
            border-radius: 4px; 
            font-family: 'Consolas', 'Courier New', monospace;
        }
    </style>
</head>
<body>

<h1>ConceptBase Web Client <img align ="right" src="https://conceptbase.sourceforge.net/conceptbase-cc-logo.gif" width="200" alt="ConceptBase Logo"></h1>
    
    <div id="main-layout">
        
        <div id="left-sidebar">
            
            <label for="cbHost">CB Host:</label>
            <input type="text" id="cbHost" value="localhost">
            
            <label for="cbPort">CB Port:</label>
            <input type="text" id="cbPort" value="4001">
 
<!--           
            <div style="font-size: small; color: #555; margin-top: 10px;">
                <p>Tool ID: CBWebClient</p>
                <p>User: cbwebclientuser</p>
            </div>
-->

            <div class="connect-buttons">
                <button onclick="connectCB()">🔗 Connect / enrollMe</button>
                <button onclick="disconnectCB()" style="background-color: #dc3545;">🚫 disconnect</button>
            </div>
        </div>
        
        <div id="right-content">
            
            <div class="section">
                <label for="commandType">Command:</label>
                <select id="commandType">
                    <option value="tell">TELL</option>
                    <option value="untell">UNTELL</option>
                    <option value="ask">ASK</option>
                </select>
                <label for="commandData">Frames/Query (e.g., Person in Class with attribute name: String end):</label>
                <textarea id="commandData" rows="8" placeholder="Enter frames here..."></textarea>
                <button onclick="executeCommand()" class="command-button">🚀 Execute Command</button>
            </div>
            
            <div class="section" style="flex-grow: 1; padding: 0;">
                <h2 style="padding: 15px 15px 0 15px; margin: 0;">Output</h2>
                <pre id="output">Status: Disconnected. Connect to begin.</pre>
            </div>
            
        </div>
        
    </div>

    <script>
        const MIDDLEWARE_URL = 'http://localhost:8080/api/cb';
        const output = document.getElementById('output');
        
        // Fixed connection parameters
        const FIXED_TOOL_ID = "CBWebClient";
        const FIXED_USER = "cbwebclientuser";

        async function sendToMiddleware(command, data = {}) {
            output.textContent = `Sending command: ${command}...`;
            try {
                const cbHost = document.getElementById('cbHost').value;
                const cbPort = document.getElementById('cbPort').value;
                
                // Build the payload using hardcoded Tool ID and User
                const payload = {
                    command,
                    host: cbHost,
                    port: parseInt(cbPort, 10),
                    tool: FIXED_TOOL_ID, // Fixed to "CBWebClient"
                    user: FIXED_USER,   // Fixed to "cbwebclientuser"
                    data: document.getElementById('commandData').value || data.data || ""
                };

                const response = await fetch(MIDDLEWARE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const json = await response.json();
                
                output.textContent = 
                    `Status: ${json.status}\n` +
                    `Message:\n${json.message}`;

            } catch (error) {
                output.textContent = `🚨 Connection Error:\n${error.message}\n` +
                                     `Check if the Java Middleware server is running on ${MIDDLEWARE_URL}.`;
            }
        }

        function connectCB() {
            sendToMiddleware('enrollMe');
        }
        
        function disconnectCB() {
            sendToMiddleware('cancelMe');
        }

        function executeCommand() {
            const command = document.getElementById('commandType').value;
            sendToMiddleware(command);
        }
    </script>
</body>
</html>
